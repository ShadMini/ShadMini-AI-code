<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShadMini-AI-code</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; }
    #editor { width:100%; height:90vh; }
    #toolbar { height:10vh; display:flex; align-items:center; padding:0 10px; background:#1e1e1e; }
    button { padding:10px 20px; background:#007acc; color:white; border:none; border-radius:4px; font-size:18px; }
    #status { color:#aaa; margin-left:10px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="aiBtn" onclick="askAI()">✨ إكمال بالذكاء الاصطناعي</button>
    <span id="status">النموذج غير محمّل</span>
  </div>
  <div id="editor"></div>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs"></script>
  <!-- WebLLM -->
  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";
    window.webllm = webllm; // اجعلها متاحة لباقي الكود
  </script>

  <script>
    // 1. تهيئة المحرر
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
    let editor;
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: '// مرحباً بك في ShadMini-AI-code\nfunction fibonacci(n) {\n  // TODO: أكمل الدالة\n}',
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true
      });
    });

    // 2. إعداد نموذج AI (StarCoder2-3B كمثال)
    let engine = null;
    const modelName = "starcoder2-3b"; // أو "deepseek-coder-1.3b"

    async function loadModel() {
      document.getElementById('status').innerText = "جارٍ تحميل النموذج... (مرة واحدة)";
      engine = await window.webllm.CreateMLCEngine(modelName);
      document.getElementById('status').innerText = "✅ النموذج جاهز";
    }
    loadModel(); // شغّل التحميل عند فتح الصفحة

    // 3. طلب AI: إرسال الكود الحالي وطلب الإكمال
    async function askAI() {
      if (!engine) {
        alert("لم يكتمل تحميل النموذج بعد، انتظر قليلاً ثم حاول");
        return;
      }
      const currentCode = editor.getValue();
      const prompt = `Complete the following JavaScript function and return only the code, no explanation:\n\`\`\`javascript\n${currentCode}\n\`\`\`\n`;
      document.getElementById('status').innerText = "🧠 يفكر...";
      const reply = await engine.chat.completions.create({
        messages: [{ role: "user", content: prompt }],
        temperature: 0.2,
        max_tokens: 500
      });
      const aiCode = reply.choices[0].message.content;
      // إضافة الإكمال بعد الكود الحالي
      editor.setValue(currentCode + "\n" + aiCode);
      document.getElementById('status').innerText = "✅ تم الإكمال";
    }
  </script>
</body>
</html>
